name: Grafana Terraform

on:
  push:
    branches: [main]
    paths:
      - "terragrunt/tools/grafana/**"
      - ".github/workflows/grafana-terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply Grafana config (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: development
            account_id: "471112892058"
          - env: staging
            account_id: "905418042182"
          - env: integration
            account_id: "767397666448"
          - env: production
            account_id: "471112843276"
    env:
      BASE_DOMAIN: supplier-information.find-tender.service.gov.uk
    concurrency:
      group: grafana-terraform-${{ matrix.env }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/cdp-sirsi-terraform
          aws-region: eu-west-2
          role-session-name: grafana-terraform-${{ matrix.env }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e

      - name: Load Grafana secrets
        id: secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.env }}" = "production" ]; then
            GRAFANA_URL="https://grafana.${BASE_DOMAIN}"
          else
            GRAFANA_URL="https://grafana.${{ matrix.env }}.${BASE_DOMAIN}"
          fi
          echo "TF_VAR_grafana_url=${GRAFANA_URL}" >> $GITHUB_ENV
          echo "TF_VAR_environment=${{ matrix.env }}" >> $GITHUB_ENV
          echo "TF_VAR_cloudwatch_account_id=${{ matrix.account_id }}" >> $GITHUB_ENV
          echo "TF_VAR_cloudwatch_assume_role_arn=arn:aws:iam::${{ matrix.account_id }}:role/cdp-sirsi-telemetry" >> $GITHUB_ENV

          GRAFANA_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id cdp-sirsi-grafana-api-token \
            --query SecretString \
            --output text)

          echo "TF_VAR_grafana_token=$(echo "$GRAFANA_SECRET" | jq -r '.API_TOKEN')" >> $GITHUB_ENV

          ALERT_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id cdp-sirsi-grafana-alerting-webhook \
            --query SecretString \
            --output text 2>/dev/null || true)

          if [ -n "$ALERT_SECRET" ]; then
            echo "TF_VAR_teams_webhook_url=$(echo "$ALERT_SECRET" | jq -r '.TEAMS_WEBHOOK_URL')" >> $GITHUB_ENV
          else
            echo "TF_VAR_teams_webhook_url=" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        working-directory: terragrunt/tools/grafana/terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terragrunt/tools/grafana/terraform
        run: terraform plan -input=false -var-file=env/${{ matrix.env }}.tfvars

      - name: Terraform Apply
        working-directory: terragrunt/tools/grafana/terraform
        run: terraform apply -input=false -auto-approve -var-file=env/${{ matrix.env }}.tfvars
